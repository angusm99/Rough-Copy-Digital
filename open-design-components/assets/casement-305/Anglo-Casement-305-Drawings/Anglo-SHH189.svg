<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1790 890" width="100%" height="100%">
      <style>
        .frame-bg { fill: #c29b27; }
        .glass-fixed { fill: rgba(40, 100, 180, 0.6); stroke: #000; stroke-width: 2; }
        .glass-sash { fill: rgba(40, 150, 70, 0.6); stroke: #000; stroke-width: 2; }
        .glass-highlight { fill: url(#glow); opacity: 0.15; }
        .sash { fill: none; stroke: #c29b27; stroke-width: 24; }
        .sash-door { fill: none; stroke: #c29b27; stroke-width: 30; }
        .opening { fill: none; stroke: #FFFFFF; stroke-width: 8; stroke-dasharray: 14,14; stroke-linecap: round; stroke-linejoin: round; }
        .slide-arrow { fill: none; stroke: #FFFFFF; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      </style>
      <defs>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
          <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
        </linearGradient>
      </defs>
    <rect class="frame-bg" x="0" y="0" width="1790" height="890" rx="4" /><rect class="glass-sash" x="45" y="45" width="515.5" height="800" /><polygon class="glass-highlight" points="45,45 560.5,45 45,845" /><rect class="sash" x="57" y="57" width="491.5" height="776" /><polyline class="opening" points="74,74 531.5,445 74,816" /><rect class="glass-fixed" x="585.5" y="45" width="619" height="800" /><polygon class="glass-highlight" points="585.5,45 1204.5,45 585.5,845" /><rect class="glass-sash" x="1229.5" y="45" width="515.5" height="800" /><polygon class="glass-highlight" points="1229.5,45 1745,45 1229.5,845" /><rect class="sash" x="1241.5" y="57" width="491.5" height="776" /><polyline class="opening" points="1716,74 1258.5,445 1716,816" /></svg>