<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1790 890" width="100%" height="100%">
        <style>
          .frame-bg { fill: #ffcc00; }
          .glass-base { fill: #0f1012; stroke: #000; stroke-width: 2; }
          .glass-f { fill: rgba(163, 210, 224, 0.25); }
          .glass-s { fill: rgba(163, 224, 163, 0.25); }
          .glass-highlight { fill: url(#glow); opacity: 0.15; }
          .glass-reflection { fill: url(#reflection); opacity: 0.6; mix-blend-mode: overlay; }
          .sash { fill: none; stroke: #ffcc00; stroke-width: 24; }
          .opening { fill: none; stroke: rgba(255,255,255,0.6); stroke-width: 6; stroke-dasharray: 12, 12; stroke-linecap: round; stroke-linejoin: round; }
        </style>
        <defs>
          <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
