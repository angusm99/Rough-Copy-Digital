<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 890" width="100%" height="100%">
        <style>
          .frame-bg { fill: #c9a05b; } /* Yellow Anglo Gold Frame */
          .glass { fill: #0f1012; stroke: #000; stroke-width: 2; }
          .glass-highlight { fill: url(#glow); opacity: 0.15; }
          .sash { fill: none; stroke: #c9a05b; stroke-width: 24; }
          .opening { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 6; stroke-dasharray: 12, 12; stroke-linecap: round; stroke-linejoin: round; }
        </style>
        <defs>
          <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff" stop-opacity="0.1"/>
            <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
          </linearGradient>
        </defs>
      <rect class="frame-bg" x="0" y="0" width="590" height="890" rx="4" /><rect class="glass" x="45" y="45" width="500" height="800" /><polygon class="glass-highlight" points="45,45 545,45 45,845" /><rect class="sash" x="57" y="57" width="476" height="776" /><polyline class="opening" points="81,81 509,445 81,809" /></svg>