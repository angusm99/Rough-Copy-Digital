<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Door Picker • Anglo Windows Digital Rough Copy</title>
  <style>
    :root {
      --bg: oklch(15.1% 0.009 239.8);
      --surface: oklch(19% 0.012 246);
      --surface-2: oklch(24% 0.014 248);
      --fg: oklch(92.5% 0.007 88.6);
      --muted: oklch(70.4% 0.031 87.6);
      --border: oklch(31% 0.015 252.3);
      --accent: oklch(87.1% 0.178 91.8);
      --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --font-body: "Segoe UI", "Segoe UI Variable Text", Inter, system-ui, sans-serif;
      --font-mono: "Cascadia Mono", "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, rgba(4, 6, 10, 0.72), rgba(4, 6, 10, 0.86)), linear-gradient(180deg, oklch(17% 0.01 245), var(--bg));
      color: var(--fg);
      font-family: var(--font-body);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .wrap {
      width: min(1220px, 100%);
      background: color-mix(in oklab, var(--surface) 92%, black 8%);
      border: 1px solid color-mix(in oklab, var(--border) 84%, white 16%);
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .head, .foot { padding: 18px 22px; }
    .head { border-bottom: 1px solid color-mix(in oklab, var(--border) 88%, white 12%); display:grid; gap:10px; }
    .label {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    h1 { margin: 0; font-size: 34px; font-family: var(--font-display); }
    .families, .configs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button, .option {
      border-radius: 10px;
      border: 1px solid color-mix(in oklab, var(--border) 84%, white 16%);
      background: color-mix(in oklab, var(--surface-2) 92%, black 8%);
      color: var(--fg);
      font: inherit;
      padding: 10px 13px;
      cursor: pointer;
    }
    .option.active { border-color: color-mix(in oklab, var(--accent) 56%, var(--border)); background: color-mix(in oklab, var(--accent) 10%, var(--surface-2)); }
    .body {
      display: grid;
      grid-template-columns: 1fr 320px;
      min-height: 0;
    }
    .catalog, .side {
      padding: 20px 22px;
      display: grid;
      gap: 14px;
      align-content: start;
      overflow-y: auto;
      max-height: 400px;
    }
    .side {
      border-left: 1px solid color-mix(in oklab, var(--border) 88%, white 12%);
      background: color-mix(in oklab, var(--surface) 88%, black 12%);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .door-card {
      padding: 15px;
      border-radius: 16px;
      border: 1px solid color-mix(in oklab, var(--border) 84%, white 16%);
      background: color-mix(in oklab, var(--surface-2) 90%, black 10%);
      cursor: pointer;
      display: grid;
      gap: 10px;
    }
    .door-card.selected { border-color: color-mix(in oklab, var(--accent) 56%, var(--border)); }
    .door-graphic {
      height: 120px;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, var(--border) 78%, var(--accent) 22%);
      background: color-mix(in oklab, var(--surface) 76%, black 24%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    svg { width: 100%; height: 100%; }
    .panel {
      padding: 15px;
      border-radius: 16px;
      border: 1px solid color-mix(in oklab, var(--border) 84%, white 16%);
      background: color-mix(in oklab, var(--surface-2) 90%, black 10%);
    }
    .input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid color-mix(in oklab, var(--border) 84%, white 16%);
      background: color-mix(in oklab, var(--surface) 72%, var(--surface-2));
      color: var(--fg);
      font: inherit;
    }
    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .panel-grid label { font-size: 13px; }
    .panel-grid .label { font-size: 11px; }
    .foot {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid color-mix(in oklab, var(--border) 88%, white 12%);
    }
    .primary { background: var(--accent); color: var(--bg); border: 0; font-weight: 700; }
    h2 { margin: 0 0 10px; font-size: 18px; }
    p { margin: 10px 0 0; line-height: 1.55; font-size: 13px; }
    @media (max-width: 980px) {
      .body { grid-template-columns: 1fr; }
      .side { border-left: 0; border-top: 1px solid color-mix(in oklab, var(--border) 88%, white 12%); }
      .cards { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      .cards { grid-template-columns: 1fr; }
      .foot { display: grid; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div class="label">Line 04 • Patio • 2400 × 2100</div>
      <h1>Pick the right door configuration.</h1>
      <div class="families" id="familyTabs">
        <button class="option active" data-family="patio">Patio Sliding</button>
        <button class="option" data-family="multislide">Multi-Slide</button>
        <button class="option" data-family="vistafold">Vistafold</button>
        <button class="option" data-family="hinged">Hinged</button>
      </div>
    </header>
    <section class="body">
      <div class="catalog">
        <div class="label" id="sectionLabel">PATIO SLIDING DOORS</div>
        <div class="cards" id="doorCards"></div>
      </div>
      <aside class="side">
        <div class="panel">
          <div class="label">Selected door</div>
          <h2 id="doorTitle">---</h2>
          <div class="panel-grid">
            <label><span class="label">Config</span><input id="configField" class="input" readonly /></label>
            <label><span class="label">Lock side</span><input id="lockField" class="input" readonly /></label>
            <label><span class="label">Opening</span><input id="openField" class="input" readonly /></label>
            <label><span class="label">Code</span><input id="codeField" class="input" readonly /></label>
            <label><span class="label">Glass</span><select id="glassField"><option>4mm Clear</option><option>Tinted</option></select></label>
            <label><span class="label">Colour</span><select id="colourField"><option>White</option><option>Aluminium</option></select></label>
          </div>
        </div>
        <div class="panel">
          <div class="label">Configuration note</div>
          <p id="configNote">Select a door configuration.</p>
        </div>
      </aside>
    </section>
    <footer class="foot">
      <button onclick="location.href='workspace.html'">Back to workspace</button>
      <button class="primary" onclick="saveDoorSelection()">Use selected door</button>
    </footer>
  </div>

  <script>
    // SVG Rendering functions
    function slidingSVG(panels, W, H) {
      const panelW = W / panels.length;
      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${W}" height="${H}" fill="none" stroke="#888" stroke-width="1"/>`;

      for (let i = 0; i < panels.length; i++) {
        const x = i * panelW;
        const isOpen = panels[i] === 'O';
        svg += `<rect x="${x}" y="0" width="${panelW}" height="${H}" fill="none" stroke="#ddd" stroke-width="1"/>`;
        if (isOpen) {
          svg += `<text x="${x + panelW/2}" y="${H/2}" text-anchor="middle" dominant-baseline="middle" font-size="24" font-weight="bold" fill="#fff" opacity="0.6">→</text>`;
        }
      }
      svg += `</svg>`;
      return svg;
    }

    function foldingSVG(leaves, W, H) {
      const leafW = W / leaves;
      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${W}" height="${H}" fill="none" stroke="#888" stroke-width="1"/>`;

      for (let i = 0; i < leaves; i++) {
        const x = i * leafW;
        svg += `<rect x="${x}" y="0" width="${leafW}" height="${H}" fill="none" stroke="#ddd" stroke-width="1"/>`;
        svg += `<line x1="${x + leafW - 4}" y1="0" x2="${x + leafW - 4}" y2="${H}" stroke="#fff" stroke-width="2" opacity="0.4"/>`;
      }
      svg += `</svg>`;
      return svg;
    }

    function hingedSVG(doubleLeaf, W, H) {
      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${W}" height="${H}" fill="none" stroke="#888" stroke-width="1"/>`;

      if (doubleLeaf) {
        const mid = W / 2;
        svg += `<rect x="0" y="0" width="${mid}" height="${H}" fill="none" stroke="#ddd" stroke-width="1"/>`;
        svg += `<rect x="${mid}" y="0" width="${mid}" height="${H}" fill="none" stroke="#ddd" stroke-width="1"/>`;
        svg += `<circle cx="4" cy="${H/2}" r="2" fill="#fff" opacity="0.6"/>`;
        svg += `<circle cx="${W-4}" cy="${H/2}" r="2" fill="#fff" opacity="0.6"/>`;
      } else {
        svg += `<rect x="0" y="0" width="${W}" height="${H}" fill="none" stroke="#ddd" stroke-width="1"/>`;
        svg += `<circle cx="4" cy="${H/2}" r="2" fill="#fff" opacity="0.6"/>`;
      }
      svg += `</svg>`;
      return svg;
    }

    function colonialSVG(doubleLeaf, bars, W, H) {
      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
      svg += `<rect width="${W}" height="${H}" fill="none" stroke="#888" stroke-width="1"/>`;

      const barSpacing = H / (bars + 1);
      for (let i = 1; i <= bars; i++) {
        svg += `<line x1="0" y1="${i * barSpacing}" x2="${W}" y2="${i * barSpacing}" stroke="#ddd" stroke-width="0.5"/>`;
      }

      if (doubleLeaf) {
        svg += `<line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="#ddd" stroke-width="1"/>`;
      }
      svg += `</svg>`;
      return svg;
    }

    const DOORS = {
      patio: [
        { id: 'SL-2-OX', config: 'OX', lock: 'Left', open: 'Slide right', code: 'SL-2-OX', label: 'Patio Slider OX (2 panel)', panels: ['O', 'X'], svg: slidingSVG },
        { id: 'SL-2-XO', config: 'XO', lock: 'Right', open: 'Slide left', code: 'SL-2-XO', label: 'Patio Slider XO (2 panel)', panels: ['X', 'O'], svg: slidingSVG },
        { id: 'SL-3-OXX', config: 'OXX', lock: 'Right', open: 'Slide left', code: 'SL-3-OXX', label: 'Patio 3-Panel OXX', panels: ['O', 'X', 'X'], svg: slidingSVG },
        { id: 'SL-3-XXO', config: 'XXO', lock: 'Left', open: 'Slide right', code: 'SL-3-XXO', label: 'Patio 3-Panel XXO', panels: ['X', 'X', 'O'], svg: slidingSVG },
        { id: 'SL-4-OXXO', config: 'OXXO', lock: 'Centre', open: 'Bi-part', code: 'SL-4-OXXO', label: 'Patio 4-Panel OXXO', panels: ['O', 'X', 'X', 'O'], svg: slidingSVG },
        { id: 'SL-6', config: '6-panel', lock: 'Custom', open: 'Custom', code: 'SL-6', label: 'Patio 6-Panel', panels: ['O', 'X', 'X', 'X', 'X', 'O'], svg: slidingSVG }
      ],
      multislide: [
        { id: 'MS-2-OX', config: 'OX', lock: 'Right', open: 'Slide left', code: 'MS-2-OX', label: 'Multi-Slide OX', brand: 'PALACE', panels: ['O', 'X'], svg: slidingSVG },
        { id: 'MS-2-XO', config: 'XO', lock: 'Left', open: 'Slide right', code: 'MS-2-XO', label: 'Multi-Slide XO', brand: 'PALACE', panels: ['X', 'O'], svg: slidingSVG },
        { id: 'MS-3-OXX', config: 'OXX', lock: 'Right', open: 'Slide left', code: 'MS-3-OXX', label: 'Multi-Slide OXX', brand: 'VALENCIA', panels: ['O', 'X', 'X'], svg: slidingSVG },
        { id: 'MS-3-XXO', config: 'XXO', lock: 'Left', open: 'Slide right', code: 'MS-3-XXO', label: 'Multi-Slide XXO', brand: 'VALENCIA', panels: ['X', 'X', 'O'], svg: slidingSVG },
        { id: 'MS-4-OXXO', config: 'OXXO', lock: 'Centre', open: 'Bi-part', code: 'MS-4-OXXO', label: 'Multi-Slide 4-Panel', brand: 'PALACE', panels: ['O', 'X', 'X', 'O'], svg: slidingSVG }
      ],
      vistafold: [
        { id: 'VF-3L', config: '3-leaf', lock: 'Left', open: 'Stack left', code: 'VF-3L', label: 'Vistafold 3-Leaf', leaves: 3, svg: foldingSVG },
        { id: 'VF-4L', config: '4-leaf', lock: 'Left', open: 'Stack left', code: 'VF-4L', label: 'Vistafold 4-Leaf', leaves: 4, svg: foldingSVG },
        { id: 'VF-5L', config: '5-leaf', lock: 'Left', open: 'Stack left', code: 'VF-5L', label: 'Vistafold 5-Leaf', leaves: 5, svg: foldingSVG },
        { id: 'VF-6L', config: '6-leaf', lock: 'Left', open: 'Stack left', code: 'VF-6L', label: 'Vistafold 6-Leaf', leaves: 6, svg: foldingSVG },
        { id: 'VF-7L', config: '7-leaf', lock: 'Left', open: 'Stack left', code: 'VF-7L', label: 'Vistafold 7-Leaf', leaves: 7, svg: foldingSVG }
      ],
      hinged: [
        { id: 'H-SL', config: 'Single', double: false, midrail: false, code: 'H-SL', label: 'Hinged Single Door', svg: hingedSVG },
        { id: 'H-DBL', config: 'Double', double: true, midrail: false, code: 'H-DBL', label: 'Hinged Double Door', svg: hingedSVG },
        { id: 'H-MID', config: 'Single + Midrail', double: false, midrail: true, code: 'H-MID', label: 'Hinged with Midrail', svg: hingedSVG },
        { id: 'H-DMID', config: 'Double + Midrail', double: true, midrail: true, code: 'H-DMID', label: 'Hinged Double + Midrail', svg: hingedSVG },
        { id: 'H-CB3S', config: 'Colonial 3-Bar Single', double: false, bars: 3, code: 'H-CB3S', label: 'Colonial 3-Bar Single', svg: colonialSVG },
        { id: 'H-CB3D', config: 'Colonial 3-Bar Double', double: true, bars: 3, code: 'H-CB3D', label: 'Colonial 3-Bar Double', svg: colonialSVG },
        { id: 'H-CB4S', config: 'Colonial 4-Bar Single', double: false, bars: 4, code: 'H-CB4S', label: 'Colonial 4-Bar Single', svg: colonialSVG },
        { id: 'H-CB4D', config: 'Colonial 4-Bar Double', double: true, bars: 4, code: 'H-CB4D', label: 'Colonial 4-Bar Double', svg: colonialSVG }
      ]
    };

    let currentFamily = 'patio';
    let selectedDoor = null;

    function renderCatalog(family) {
      const catalog = DOORS[family];
      const cardsHtml = catalog.map(door => {
        const svgContent = door.svg(door.panels || door.leaves || false, 100, 80);
        return `
          <article class="door-card" data-id="${door.id}">
            <div class="door-graphic">${svgContent}</div>
            <strong>${door.label}</strong>
            <div class="label">${door.code}</div>
          </article>
        `;
      }).join('');

      document.getElementById('doorCards').innerHTML = cardsHtml;

      const labels = {
        patio: 'PATIO SLIDING',
        multislide: 'MULTI-SLIDE',
        vistafold: 'VISTAFOLD',
        hinged: 'HINGED DOORS'
      };
      document.getElementById('sectionLabel').textContent = labels[family];

      document.querySelectorAll('.door-card').forEach(card => {
        card.addEventListener('click', () => selectDoor(family, card.dataset.id));
      });
    }

    function selectDoor(family, doorId) {
      const door = DOORS[family].find(d => d.id === doorId);
      if (!door) return;

      selectedDoor = { ...door, family };

      document.querySelectorAll('.door-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-id="${doorId}"]`).classList.add('selected');

      document.getElementById('doorTitle').textContent = door.label;
      document.getElementById('configField').value = door.config || '';
      document.getElementById('lockField').value = door.lock || '';
      document.getElementById('openField').value = door.open || '';
      document.getElementById('codeField').value = door.code;
      document.getElementById('configNote').textContent = door.label + ' • ' + door.code;
    }

    document.getElementById('familyTabs').addEventListener('click', (e) => {
      if (!e.target.classList.contains('option')) return;

      document.querySelectorAll('#familyTabs .option').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');

      currentFamily = e.target.dataset.family;
      renderCatalog(currentFamily);
      selectedDoor = null;

      document.getElementById('doorTitle').textContent = '---';
      document.getElementById('configField').value = '';
      document.getElementById('lockField').value = '';
      document.getElementById('openField').value = '';
      document.getElementById('codeField').value = '';
      document.getElementById('configNote').textContent = 'Select a door configuration.';
    });

    function saveDoorSelection() {
      if (!selectedDoor) {
        alert('Please select a door first.');
        return;
      }

      const selection = {
        doorId: selectedDoor.id,
        family: selectedDoor.family,
        code: selectedDoor.code,
        config: selectedDoor.config,
        lock: selectedDoor.lock,
        open: selectedDoor.open,
        glass: document.getElementById('glassField').value,
        colour: document.getElementById('colourField').value,
        timestamp: new Date().toISOString()
      };

      localStorage.setItem('aw_picker_selection', JSON.stringify(selection));
      location.href = 'workspace.html';
    }

    renderCatalog('patio');
  </script>
</body>
</html>
